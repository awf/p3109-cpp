name: C++ CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux Release
            build_type: Release
            sanitizers: false
          - os: ubuntu-latest
            name: Linux Sanitizers
            build_type: Debug
            sanitizers: true
          - os: macos-latest
            name: macOS Release
            build_type: Release
            sanitizers: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libboost-all-dev \
            libmpfr-dev \
            libgmp-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja boost mpfr gmp

      - name: Configure
        run: |
          if [ "${{ matrix.sanitizers }}" = "true" ]; then
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            BREW_PREFIX="$(brew --prefix)"
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DCMAKE_PREFIX_PATH="$BREW_PREFIX;$BREW_PREFIX/opt/boost"
          else
            cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          fi

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
